<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115">
  <!-- Ears — drooping down heavily -->
  <ellipse cx="17" cy="58" rx="10" ry="20" fill="#7030A0" transform="rotate(18 17 58)"/>
  <ellipse cx="17" cy="58" rx="6.5" ry="13" fill="#E0C0F0" transform="rotate(18 17 58)"/>
  <ellipse cx="83" cy="58" rx="10" ry="20" fill="#7030A0" transform="rotate(-18 83 58)"/>
  <ellipse cx="83" cy="58" rx="6.5" ry="13" fill="#E0C0F0" transform="rotate(-18 83 58)"/>
  <!-- Head -->
  <ellipse cx="50" cy="65" rx="34" ry="36" fill="#FAF5FF" stroke="#D0B0E8" stroke-width="1.2"/>
  <!-- Flat/slumped hair -->
  <ellipse cx="50" cy="31" rx="18" ry="8" fill="#7030A0"/>
  <!-- Very heavy eyebrows slanting sharply inward/downward -->
  <path d="M 24 52 Q 31 46 40 51" stroke="#3a0060" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M 76 52 Q 69 46 60 51" stroke="#3a0060" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes — half-lidded, droopy -->
  <ellipse cx="37" cy="59" rx="9.5" ry="8.5" fill="white"/>
  <ellipse cx="63" cy="59" rx="9.5" ry="8.5" fill="white"/>
  <!-- Heavy eyelid covers top third -->
  <ellipse cx="37" cy="53.5" rx="10.5" ry="6.5" fill="#FAF5FF"/>
  <ellipse cx="63" cy="53.5" rx="10.5" ry="6.5" fill="#FAF5FF"/>
  <!-- Iris — purple -->
  <circle cx="37" cy="61" r="5.5" fill="#5a1a88"/>
  <circle cx="63" cy="61" r="5.5" fill="#5a1a88"/>
  <!-- Pupils -->
  <ellipse cx="37" cy="61" rx="3" ry="2.2" fill="#180028"/>
  <ellipse cx="63" cy="61" rx="3" ry="2.2" fill="#180028"/>
  <!-- Small sad shine -->
  <circle cx="38.5" cy="58.5" r="1.3" fill="white"/>
  <circle cx="64.5" cy="58.5" r="1.3" fill="white"/>
  <!-- Dark circles under eyes -->
  <ellipse cx="37" cy="65" rx="10" ry="3.5" fill="#C0A0D8" opacity="0.35"/>
  <ellipse cx="63" cy="65" rx="10" ry="3.5" fill="#C0A0D8" opacity="0.35"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="77" rx="13" ry="9.5" fill="#E0C0F0" stroke="#C8A0E0" stroke-width="0.8"/>
  <!-- Nostrils -->
  <ellipse cx="46" cy="76" rx="2.5" ry="2" fill="#8050A8" opacity="0.8"/>
  <ellipse cx="54" cy="76" rx="2.5" ry="2" fill="#8050A8" opacity="0.8"/>
  <!-- Deep frown -->
  <path d="M 36 85 Q 43 79 50 79 Q 57 79 64 85" stroke="#4a1a6e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Frown corner wrinkles -->
  <path d="M 36 85 Q 33 88 35 91" stroke="#8050A8" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 64 85 Q 67 88 65 91" stroke="#8050A8" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Purple cheek tone (tired) -->
  <circle cx="26" cy="67" r="8" fill="#8B45B0" opacity="0.12"/>
  <circle cx="74" cy="67" r="8" fill="#8B45B0" opacity="0.12"/>
  <!-- Chin tuft -->
  <ellipse cx="50" cy="104" rx="9" ry="7" fill="#7030A0" opacity="0.85"/>
</svg>
