<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115">
  <!-- Ears pinned back and angled -->
  <ellipse cx="15" cy="43" rx="9" ry="16" fill="#C02010" transform="rotate(28 15 43)"/>
  <ellipse cx="15" cy="43" rx="5.5" ry="10" fill="#FDBDBD" transform="rotate(28 15 43)"/>
  <ellipse cx="85" cy="43" rx="9" ry="16" fill="#C02010" transform="rotate(-28 85 43)"/>
  <ellipse cx="85" cy="43" rx="5.5" ry="10" fill="#FDBDBD" transform="rotate(-28 85 43)"/>
  <!-- Head -->
  <ellipse cx="50" cy="65" rx="34" ry="36" fill="#FFF5F5" stroke="#EEC0C0" stroke-width="1.2"/>
  <!-- Spiky hair -->
  <polygon points="44,32 41,20 48,28" fill="#C02010"/>
  <polygon points="50,30 50,18 54,28" fill="#B01808"/>
  <polygon points="56,32 59,20 52,28" fill="#C02010"/>
  <!-- Thick angry eyebrows — heavy, slanting down toward center -->
  <path d="M 25 51 Q 31 45 39 49" stroke="#200000" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M 75 51 Q 69 45 61 49" stroke="#200000" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes — narrowed/squinting -->
  <ellipse cx="37" cy="58" rx="9.5" ry="7" fill="white"/>
  <ellipse cx="63" cy="58" rx="9.5" ry="7" fill="white"/>
  <!-- Iris — dark red -->
  <ellipse cx="37" cy="58" rx="6" ry="5" fill="#880800"/>
  <ellipse cx="63" cy="58" rx="6" ry="5" fill="#880800"/>
  <!-- Pupils -->
  <ellipse cx="37" cy="58" rx="3.5" ry="2.5" fill="#1a0000"/>
  <ellipse cx="63" cy="58" rx="3.5" ry="2.5" fill="#1a0000"/>
  <!-- Eye shine -->
  <circle cx="39" cy="55.5" r="1.5" fill="white"/>
  <circle cx="65" cy="55.5" r="1.5" fill="white"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="76" rx="13.5" ry="9.5" fill="#FDBDBD" stroke="#EEC0C0" stroke-width="0.8"/>
  <!-- Nostrils — flared -->
  <ellipse cx="46" cy="75" rx="3" ry="2.2" fill="#A05050" opacity="0.9"/>
  <ellipse cx="54" cy="75" rx="3" ry="2.2" fill="#A05050" opacity="0.9"/>
  <!-- Steam wisps from nostrils -->
  <path d="M 45 71 Q 42 67 44 63" stroke="#CCC" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M 55 71 Q 58 67 56 63" stroke="#CCC" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.75"/>
  <!-- Tight grimace with gritted teeth -->
  <path d="M 37 83 Q 50 88 63 83" stroke="#700000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="43" y1="83.5" x2="43" y2="87" stroke="#700000" stroke-width="1.3"/>
  <line x1="50" y1="84.5" x2="50" y2="88" stroke="#700000" stroke-width="1.3"/>
  <line x1="57" y1="83.5" x2="57" y2="87" stroke="#700000" stroke-width="1.3"/>
  <!-- Red cheek flush -->
  <circle cx="26" cy="66" r="8" fill="#E03020" opacity="0.15"/>
  <circle cx="74" cy="66" r="8" fill="#E03020" opacity="0.15"/>
  <!-- Chin tuft -->
  <ellipse cx="50" cy="104" rx="8" ry="6.5" fill="#C02010" opacity="0.7"/>
</svg>
