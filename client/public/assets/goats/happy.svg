<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115">
  <!-- Ears — perky and upright -->
  <ellipse cx="20" cy="38" rx="10" ry="18" fill="#18A040" transform="rotate(-8 20 38)"/>
  <ellipse cx="20" cy="38" rx="6" ry="11" fill="#C8F0C8" transform="rotate(-8 20 38)"/>
  <ellipse cx="80" cy="38" rx="10" ry="18" fill="#18A040" transform="rotate(8 80 38)"/>
  <ellipse cx="80" cy="38" rx="6" ry="11" fill="#C8F0C8" transform="rotate(8 80 38)"/>
  <!-- Head -->
  <ellipse cx="50" cy="65" rx="34" ry="36" fill="#F5FFF5" stroke="#B0E0B0" stroke-width="1.2"/>
  <!-- Cheerful hair tuft -->
  <ellipse cx="50" cy="31" rx="10" ry="12" fill="#22BB55"/>
  <ellipse cx="42" cy="33" rx="7" ry="9.5" fill="#18A040"/>
  <ellipse cx="58" cy="33" rx="7" ry="9.5" fill="#18A040"/>
  <!-- Eyebrows — raised in delight -->
  <path d="M 27 50 Q 33 45 39 49" stroke="#1a4020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 73 50 Q 67 45 61 49" stroke="#1a4020" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes — wide and bright -->
  <ellipse cx="37" cy="58" rx="10" ry="9.5" fill="white" stroke="#B0E0B0" stroke-width="0.5"/>
  <ellipse cx="63" cy="58" rx="10" ry="9.5" fill="white" stroke="#B0E0B0" stroke-width="0.5"/>
  <!-- Iris — vivid green -->
  <circle cx="37" cy="59" r="6.5" fill="#1a7030"/>
  <circle cx="63" cy="59" r="6.5" fill="#1a7030"/>
  <!-- Pupils -->
  <ellipse cx="37" cy="59" rx="3.5" ry="2.5" fill="#0a1808"/>
  <ellipse cx="63" cy="59" rx="3.5" ry="2.5" fill="#0a1808"/>
  <!-- Big double shine -->
  <circle cx="40" cy="55.5" r="2.2" fill="white"/>
  <circle cx="66" cy="55.5" r="2.2" fill="white"/>
  <circle cx="36" cy="61" r="1" fill="white"/>
  <circle cx="62" cy="61" r="1" fill="white"/>
  <!-- Muzzle -->
  <ellipse cx="50" cy="76" rx="13" ry="9.5" fill="#C8F0C8" stroke="#A0D8A0" stroke-width="0.8"/>
  <!-- Nostrils -->
  <ellipse cx="46" cy="75" rx="2.5" ry="2" fill="#60A060" opacity="0.8"/>
  <ellipse cx="54" cy="75" rx="2.5" ry="2" fill="#60A060" opacity="0.8"/>
  <!-- Wide beaming smile -->
  <path d="M 33 82 Q 42 94 50 94 Q 58 94 67 82" stroke="#0a5020" stroke-width="2.5" fill="#AAEEBB" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Green rosy cheeks -->
  <circle cx="25" cy="68" r="9" fill="#22BB55" opacity="0.18"/>
  <circle cx="75" cy="68" r="9" fill="#22BB55" opacity="0.18"/>
  <!-- Little sparkles -->
  <text x="13" y="48" font-size="11" fill="#22BB55" opacity="0.8">★</text>
  <text x="78" y="45" font-size="9" fill="#22BB55" opacity="0.7">✦</text>
  <!-- Chin tuft -->
  <ellipse cx="50" cy="104" rx="9" ry="7" fill="#18A040" opacity="0.8"/>
</svg>
