<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Negoatiations</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      overflow: hidden;
    }

    #lobby {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .lobby-container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
    }

    .lobby-container h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
      font-size: 32px;
    }

    .lobby-section {
      margin-bottom: 30px;
    }

    .lobby-section h2 {
      font-size: 18px;
      color: #555;
      margin-bottom: 15px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    button:active {
      transform: scale(0.98);
    }

    .rooms-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .room-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .room-item:hover {
      background: #f5f5f5;
    }

    .room-item:last-child {
      border-bottom: none;
    }

    .room-info {
      flex: 1;
    }

    .room-name {
      font-weight: bold;
      color: #333;
    }

    .room-players {
      font-size: 14px;
      color: #888;
      margin-top: 5px;
    }

    .player-count {
      background: #667eea;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
    }

    #game-container {
      display: none;
      width: 100vw;
      height: 100vh;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    .no-rooms {
      text-align: center;
      padding: 30px;
      color: #999;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="lobby">
    <div class="lobby-container">
      <h1>🐐 Negoatiations</h1>

      <div class="lobby-section">
        <input type="text" id="player-name" placeholder="Enter your name..." />
        <button id="create-game-btn">Create Game</button>
      </div>

      <div class="lobby-section">
        <h2>Join a Game</h2>
        <div class="rooms-list" id="rooms-list">
          <div class="loading">Loading rooms...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="game-container"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
